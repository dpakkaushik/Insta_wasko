name: Telegram-triggered Post

on:
  workflow_dispatch:         # manual trigger from GitHub UI only

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Telegram for a new message
        id: telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_listener.py

      - name: Post custom text to Instagram
        if: steps.telegram.outputs.has_message == 'true'
        env:
          CUSTOM_TEXT:           ${{ steps.telegram.outputs.message }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          INSTAGRAM_USERNAME:    ${{ secrets.INSTAGRAM_USERNAME }}
          IG_USER_ID:            ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
          IG_APP_SECRET:         ${{ secrets.IG_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          POST_INTERVAL_HOURS:   ${{ secrets.POST_INTERVAL_HOURS }}
        run: python main.py --once

      - name: Save Telegram offset
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telegram_offset.json || true
          git diff --cached --quiet || (git commit -m "chore: update telegram offset [skip ci]" && git push)
