name: Telegram Video Preview

on:
  workflow_dispatch:         # manual trigger from GitHub UI only
    inputs:
      text:
        description: 'Optional preview text, e.g. swag: my line'
        required: false
        type: string

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg libavcodec-extra

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Use workflow input text
        id: input_text
        if: github.event.inputs.text != ''
        run: |
          echo "has_message=true" >> "$GITHUB_OUTPUT"
          echo "message<<PREVIEW_EOF" >> "$GITHUB_OUTPUT"
          echo "${{ github.event.inputs.text }}" >> "$GITHUB_OUTPUT"
          echo "PREVIEW_EOF" >> "$GITHUB_OUTPUT"

      - name: Check Telegram for preview text
        id: telegram
        if: github.event.inputs.text == ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_POLL_SECONDS: 45
        run: python telegram_listener.py

      - name: Generate preview video
        if: steps.input_text.outputs.has_message == 'true' || steps.telegram.outputs.has_message == 'true'
        env:
          CUSTOM_TEXT:           ${{ steps.input_text.outputs.message || steps.telegram.outputs.message }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          INSTAGRAM_USERNAME:    ${{ secrets.INSTAGRAM_USERNAME }}
          IG_USER_ID:            ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
          IG_APP_SECRET:         ${{ secrets.IG_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          POST_INTERVAL_HOURS:   ${{ secrets.POST_INTERVAL_HOURS }}
        run: python main.py --once --dry

      - name: Send preview video to Telegram
        if: steps.input_text.outputs.has_message == 'true' || steps.telegram.outputs.has_message == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram_video.py

      - name: Save Telegram offset
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add telegram_offset.json || true
          git diff --cached --quiet || (git commit -m "chore: update telegram offset [skip ci]" && git push)
