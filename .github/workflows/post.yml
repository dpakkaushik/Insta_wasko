name: Post to Instagram

on:
  schedule:
    - cron: '30 2 * * *'   #  8:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 10 * * *'  #  4:00 PM IST
    - cron: '30 14 * * *'  #  8:00 PM IST
    - cron: '30 18 * * *'  # 12:00 AM IST
    - cron: '30 22 * * *'  #  4:00 AM IST
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          INSTAGRAM_USERNAME:    ${{ secrets.INSTAGRAM_USERNAME }}
          IG_USER_ID:            ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
          IG_APP_SECRET:         ${{ secrets.IG_APP_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          POST_INTERVAL_HOURS:   ${{ secrets.POST_INTERVAL_HOURS }}
        run: python main.py --once

      - name: Save history files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio_history.json oneliner_index_male.json oneliner_index_female.json ig_token.json || true
          git diff --cached --quiet || (git commit -m "chore: update history after run [skip ci]" && git push)
